<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="35%" style="stop-color:#0c0618"/>
      <stop offset="70%" style="stop-color:#08111f"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="45%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff2d92"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#sheen)"/>
  <ellipse cx="150" cy="150" rx="200" ry="120" fill="#00f5ff" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="1000" cy="80" rx="250" ry="140" fill="#ff2d92" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="600" cy="260" rx="350" ry="80" fill="#a855f7" opacity="0.1" filter="url(#blur)"/>
  <line x1="80" y1="295" x2="1120" y2="295" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
  <text x="600" y="118" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="2">F A I A Z</text>
  <text x="600" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="2">Z A H I N</text>
  <text x="600" y="220" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#7d8da6" letter-spacing="5">AI Ę DATA Ę FULL STACK Ę DHAKA</text>
