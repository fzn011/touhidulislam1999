<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="50%" style="stop-color:#bf5af2"/>
      <stop offset="100%" style="stop-color:#ff2d92"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="110" cy="110" r="104" fill="none" stroke="url(#ring)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="110" cy="110" r="98" fill="#0a0a0f"/>
  <clipPath id="avatar-clip">
    <circle cx="110" cy="110" r="92"/>
  </clipPath>
  <image href="avatar.png" x="18" y="18" width="184" height="184" clip-path="url(#avatar-clip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
